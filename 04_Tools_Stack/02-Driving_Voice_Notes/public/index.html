<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Driving Voice Notes</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header class="header">
    <h1>Driving Notes</h1>
    <a id="notion-link" class="notion-btn" href="#" target="_blank" rel="noopener">
      <span class="icon">📋</span> Open Notion
    </a>
  </header>

  <main class="recorder">
    <p id="mode-label" class="mode-label">Tap the mic to begin</p>

    <button id="mic-btn" class="mic-btn idle" aria-label="Record voice note">
      <span id="mic-icon">🎙️</span>
    </button>

    <div id="timer" class="timer">00:00</div>

    <p id="live-text" class="live-text"></p>

    <p id="today-count" class="today-count">Today: 0 items captured</p>

    <div class="instructions">
      <h3>How it works</h3>
      <ol>
        <li>Say <strong>"Hello Jack"</strong> to start a note</li>
        <li>Speak naturally — your tasks, reminders, ideas</li>
        <li>Say <strong>"Done"</strong> or pause 5 seconds to finish</li>
        <li>Action items appear in your <strong>Notion</strong> database</li>
      </ol>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <!-- Inject server-side config for the Notion link -->
  <script>
    window.NOTION_LINK = ''; // replaced by server if NOTION_LINK env is set
  </script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
